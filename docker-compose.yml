services:
  frigate:
    container_name: spaceguardian-frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "512mb"
    ports:
      - "8971:8971"
      # Keep Frigate UI on 8971. Expose the internal API on 5001 so it is
      # harder to accidentally browse the UI through port 5000, which can
      # break image rendering in Explore on some local setups.
      - "5001:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
      # Optional go2rtc debug UI / stream inspector.
      - "1984:1984"
    environment:
      # Frigate only substitutes env vars in config when they use the
      # FRIGATE_ prefix, so expose the camera URL with that name.
      FRIGATE_CAMERA_FRONT_RTSP_URL: ${CAMERA_FRONT_RTSP_URL}
      TZ: ${FRIGATE_TIMEZONE:-Asia/Bangkok}
    volumes:
      - ./config/frigate:/config
      - ./storage/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro

  squareguardian:
    container_name: spaceguardian-detector
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FRIGATE_URL: http://frigate:5000
      LISTEN_ADDR: ":8080"
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-5}
      TRACKED_ITEMS: ${TRACKED_ITEMS:-person,car,motorcycle,bus,backpack,suitcase,handbag}
      EVENT_LOG_PATH: /data/events
      MAX_STORAGE_GB: ${MAX_STORAGE_GB:-256}
      BUFFER_GB: ${BUFFER_GB:-10}
      SAVE_INTERVAL_SEC: ${SAVE_INTERVAL_SEC:-30}
    volumes:
      - ./storage/events:/data/events
    depends_on:
      - frigate
