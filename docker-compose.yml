services:
  frigate:
    container_name: spaceguardian-frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "512mb"
    ports:
      - "8971:8971"
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    environment:
      FRIGATE_TAPO_RTSP_URL: ${FRIGATE_TAPO_RTSP_URL}
      FRIGATE_TIMEZONE: ${FRIGATE_TIMEZONE:-Asia/Bangkok}
    volumes:
      - ./config/frigate:/config
      - ./storage/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro

  squareguardian:
    container_name: spaceguardian-detector
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FRIGATE_URL: http://frigate:5000
      LISTEN_ADDR: ":8080"
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-5}
      TRACKED_ITEMS: ${TRACKED_ITEMS:-person,car,motorcycle,bus,truck,backpack,suitcase,handbag}
      EVENT_LOG_PATH: /data/events
    volumes:
      - ./storage/events:/data/events
    depends_on:
      - frigate
