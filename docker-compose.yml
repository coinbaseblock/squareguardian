services:
  frigate:
    container_name: squareguardian-frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    shm_size: "512mb"
    entrypoint: ["/bin/sh", "/config/scripts/generate-frigate-config.sh"]
    command: ["/init"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8971:8971"
      # Keep Frigate UI on 8971. Expose the internal API on 5001 so it is
      # harder to accidentally browse the UI through port 5000, which can
      # break image rendering in Explore on some local setups.
      - "5001:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
      # Optional go2rtc debug UI / stream inspector.
      - "1984:1984"
    environment:
      # Multi-camera support: add FRIGATE_CAMERA_<NAME>_RTSP_URL for each camera.
      # The entrypoint script auto-generates Frigate config from these variables.
      FRIGATE_CAMERA_FRONT_RTSP_URL: ${CAMERA_FRONT_RTSP_URL:-}
      FRIGATE_CAMERA_BACK_RTSP_URL: ${CAMERA_BACK_RTSP_URL:-}
      FRIGATE_CAMERA_PARKING_RTSP_URL: ${CAMERA_PARKING_RTSP_URL:-}
      FRIGATE_CAMERA_GATE_RTSP_URL: ${CAMERA_GATE_RTSP_URL:-}
      # Zone definitions (optional): zone_name:coords;zone2:coords2
      FRIGATE_CAMERA_FRONT_ZONES: ${CAMERA_FRONT_ZONES:-front_door:0.05,0.95,0.38,0.95,0.38,0.40,0.05,0.40}
      FRIGATE_CAMERA_BACK_ZONES: ${CAMERA_BACK_ZONES:-}
      FRIGATE_CAMERA_PARKING_ZONES: ${CAMERA_PARKING_ZONES:-}
      FRIGATE_CAMERA_GATE_ZONES: ${CAMERA_GATE_ZONES:-}
      # Detection settings
      FRIGATE_DETECT_WIDTH: ${FRIGATE_DETECT_WIDTH:-1280}
      FRIGATE_DETECT_HEIGHT: ${FRIGATE_DETECT_HEIGHT:-720}
      FRIGATE_DETECT_FPS: ${FRIGATE_DETECT_FPS:-5}
      TZ: ${FRIGATE_TIMEZONE:-Asia/Bangkok}
    volumes:
      - ./config/frigate:/config
      - ./scripts/generate-frigate-config.sh:/config/scripts/generate-frigate-config.sh:ro
      - ./storage/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro

  squareguardian:
    container_name: squareguardian-detector
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FRIGATE_URL: http://frigate:5000
      LISTEN_ADDR: ":8080"
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-5}
      TRACKED_ITEMS: ${TRACKED_ITEMS:-person,car,motorcycle,bus,backpack,suitcase,handbag}
      EVENT_LOG_PATH: /data/events
      MAX_STORAGE_GB: ${MAX_STORAGE_GB:-256}
      BUFFER_GB: ${BUFFER_GB:-10}
      SAVE_INTERVAL_SEC: ${SAVE_INTERVAL_SEC:-30}
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-service:8082}
    volumes:
      - ./storage/events:/data/events
      - ./config/frigate:/config:ro
    depends_on:
      - frigate

  face-service:
    profiles: ["identity"]
    container_name: squareguardian-face
    build:
      context: ./services/face
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./storage/face-db:/data
    environment:
      MODEL_NAME: ${FACE_MODEL_NAME:-buffalo_s}
      MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.45}
      SUGGEST_THRESHOLD: ${FACE_SUGGEST_THRESHOLD:-0.35}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
